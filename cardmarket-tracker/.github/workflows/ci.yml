name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run tests
        run: pytest tests/ -v
        env:
          CM_APP_TOKEN: dummy
          CM_APP_SECRET: dummy
          CM_ACCESS_TOKEN: dummy
          CM_ACCESS_TOKEN_SECRET: dummy
          DATABASE_URL: sqlite:///./test.db
